server:
  port: 8080

spring:
  application:
    name: goodthings-server
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/goodthings?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: root
  servlet:
    multipart:
      enabled: true
      max-file-size: 100MB
      max-request-size: 100MB
  web:
    resources:
      static-locations: classpath:/static/,classpath:/public/,file:src/main/resources/static/

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.goodthings.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: delFlag
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT配置
jwt:
  secret: goodthings-secret-key-change-in-production
  expiration: 86400000  # 24小时

# 文件上传配置
file:
  upload-dir: src/main/resources/static/uploads

# 分页配置
page:
  default-size: 20
  max-size: 100
